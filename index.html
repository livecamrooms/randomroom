<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Now</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid #1a1a1a;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff1a75;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff1a75;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .room-count {
      font-size: 13px;
      color: #555;
    }

    .room-count span {
      color: #888;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 900px;
      width: 100%;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 4/3;
      background: #0d0d0d;
      overflow: hidden;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .thumb-wrap img:hover { transform: scale(1.03); }

    .thumb-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    }

    .info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px;
      gap: 20px;
    }

    .username {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
    }

    .viewers {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #ff1a75;
      font-weight: 600;
    }

    .subject {
      font-size: 13px;
      color: #777;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 4px 10px;
      letter-spacing: 0.03em;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ff1a75;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      padding: 16px 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      width: 100%;
      margin-top: 4px;
    }

    .cta:hover { background: #e0005e; transform: translateY(-1px); }
    .cta:active { transform: translateY(0); }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: transparent;
      color: #555;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      width: 100%;
    }

    .refresh-btn:hover { color: #ccc; border-color: #444; }

    .refresh-btn svg { transition: transform 0.5s ease; }

    .refresh-btn.spinning svg {
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-thumb { width: 100%; height: 100%; border-radius: 0; }
    .skeleton-title { height: 40px; width: 80%; margin-bottom: 16px; }
    .skeleton-text { height: 14px; margin-bottom: 8px; }

    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 40px;
      color: #555;
      text-align: center;
      grid-column: 1 / -1;
    }

    .error-state p { font-size: 14px; }

    .retry-btn {
      background: #1c1c1c;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover { background: #252525; }

    @media (max-width: 640px) {
      .card { grid-template-columns: 1fr; }
      .thumb-wrap { aspect-ratio: 16/9; }
      .info { padding: 24px; }
      .username { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live Now
    </div>
    <div class="room-count" id="room-count"></div>
  </header>

  <main>
    <div class="card" id="card">
      <div class="thumb-wrap">
        <div class="skeleton skeleton-thumb" style="height:100%;"></div>
      </div>
      <div class="info">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text" style="width:50%;"></div>
        <div class="skeleton skeleton-text" style="width:90%;"></div>
        <div class="skeleton skeleton-text" style="width:70%;"></div>
      </div>
    </div>
  </main>

  <script>
    const API_URL = 'https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip&gender=f&limit=500';
    const AFFILIATE_BASE = 'https://chaturbate.com/in/?tour=41Ea&campaign=T2CSW&track=default&room=';

    function showSkeleton() {
      document.getElementById('card').innerHTML = `
        <div class="thumb-wrap">
          <div class="skeleton skeleton-thumb" style="height:100%;"></div>
        </div>
        <div class="info">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text" style="width:50%;"></div>
          <div class="skeleton skeleton-text" style="width:90%;"></div>
          <div class="skeleton skeleton-text" style="width:70%;"></div>
        </div>`;
    }

    async function loadRoom() {
      showSkeleton();
      document.getElementById('room-count').innerHTML = '';

      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const rooms = (data.results || []).filter(r => r.gender === 'f');
        if (!rooms.length) throw new Error('No rooms');

        const room = rooms[Math.floor(Math.random() * rooms.length)];
        renderRoom(room, rooms.length);
      } catch (err) {
        showError();
      }
    }

    function renderRoom(room, total) {
      document.getElementById('room-count').innerHTML =
        `<span>${total.toLocaleString()}</span> rooms live`;

      const img = room.image_url_360x270 || room.image_url || '';
      const tags = (room.tags || []).slice(0, 6)
        .map(t => `<span class="tag">#${t}</span>`).join('');
      const subject = room.subject || '';
      const viewers = (room.num_users || 0).toLocaleString();
      const affiliateUrl = AFFILIATE_BASE + encodeURIComponent(room.username);

      document.getElementById('card').innerHTML = `
        <div class="thumb-wrap">
          <img src="${img}" alt="${room.username}" loading="eager" />
          <div class="thumb-overlay"></div>
        </div>
        <div class="info">
          <div class="username">${room.username}</div>
          <div class="viewers">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            ${viewers} watching
          </div>
          ${subject ? `<div class="subject">${subject}</div>` : ''}
          ${tags ? `<div class="tags">${tags}</div>` : ''}
          <a class="cta" href="${affiliateUrl}" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Watch Live
          </a>
          <button class="refresh-btn" id="refresh-btn" onclick="nextRoom(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Next Room
          </button>
        </div>`;
    }

    function showError() {
      document.getElementById('room-count').innerHTML = '';
      document.getElementById('card').innerHTML = `
        <div class="error-state">
          <p>Could not load a room right now.</p>
          <button class="retry-btn" onclick="loadRoom()">Try Again</button>
        </div>`;
    }

    function nextRoom(btn) {
      btn.classList.add('spinning');
      loadRoom().finally(() => {
        const b = document.getElementById('refresh-btn');
        if (b) b.classList.remove('spinning');
      });
    }

    loadRoom();
  </script>

</body>
</html>
